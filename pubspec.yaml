name: gokula_inventory
description: Offline-first tile inventory app with Supabase sync.
publish_to: 'none'
version: 1.6.2+18

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5
  supabase_flutter: ^2.6.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.4
  http: ^1.2.2
  package_info_plus: ^8.1.0
  open_filex: ^4.6.0
  excel: ^4.0.6
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  cross_file: ^0.3.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.jpg
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/images/logo.jpg

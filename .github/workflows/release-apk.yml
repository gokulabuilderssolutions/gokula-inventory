name: Build and publish Android release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          test -s android/app/upload-keystore.jks
          echo "Keystore restored successfully"

      - name: Verify signing secrets
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "ERROR: KEYSTORE_PASSWORD secret is missing"
            exit 1
          fi

          if [ -z "$KEY_ALIAS" ]; then
            echo "ERROR: KEY_ALIAS secret is missing"
            exit 1
          fi

          if [ -z "$KEY_PASSWORD" ]; then
            echo "ERROR: KEY_PASSWORD secret is missing"
            exit 1
          fi

          echo "All signing secrets are available"

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build signed APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "gokula-inventory-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: gokula-inventory-${{ github.ref_name }}.apk
